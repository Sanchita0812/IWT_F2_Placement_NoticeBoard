<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlaceIntel | Dashboard</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
    <div id="app-section" class="app-container">
        <aside class="sidebar">
            <h2>PlaceIntel</h2>
            <div class="nav-item active" id="nav-notice" onclick="switchTab('notice')">Noticeboard</div>
            <div class="nav-item" id="nav-feed" onclick="switchTab('feed')">Intelligence Feed</div>
            <div class="nav-item" id="nav-profile" onclick="switchTab('profile')">Profile</div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </aside>

        <main class="content">
            <div id="tab-notice">
                <div class="section-header">
                    <div style="font-size: 28px; font-weight: 800;">Noticeboard</div>
                    <button id="createPostBtnNotice" class="btn-primary" onclick="openModal('uploadModal')">+ Create
                        Post</button>
                </div>
                <div id="noticeGrid"></div>
            </div>

            <div id="tab-feed" class="hidden">
                <div style="font-size: 28px; font-weight: 800; margin-bottom: 24px;">Intelligence Feed</div>
                <div class="feed-card">
                    <textarea id="feedInput" placeholder="Start a post..."
                        style="border: none; border-bottom: 1px solid #eee; border-radius: 0; outline: none; margin-bottom: 15px; resize: none; min-height: 60px;"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; gap: 15px;">
                            <label for="feedFile"
                                style="cursor: pointer; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 5px;">
                                Media
                            </label>
                            <input type="file" id="feedFile" class="hidden" accept="image/*,video/*">
                        </div>
                        <button class="btn-primary" style="padding: 8px 16px; border-radius: 20px;"
                            onclick="submitFeedPost()">Post</button>
                    </div>
                </div>
                <div id="feedList"></div>
            </div>

            <div id="tab-profile" class="hidden">
                <div class="section-header">
                    <div style="font-size: 28px; font-weight: 800;">Your Profile</div>
                    <button class="btn-secondary" onclick="openModal('editProfileModal')">Edit Profile</button>
                </div>
                <div class="profile-header">
                    <div class="avatar-wrapper">
                        <img id="displayAvatar" class="profile-avatar" src="https://via.placeholder.com/100" />
                    </div>
                    <div>
                        <h2 id="displayUser" style="margin: 0 0 5px 0;">User Name</h2>
                        <p id="displayBio" style="color: var(--muted); margin: 0;">No bio added yet. Click edit to add
                            one.</p>
                    </div>
                </div>
                <div class="notice-card">
                    <h3>Education</h3>
                    <p id="displayEd">Not specified.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-bg" id="uploadModal">
        <div class="modal">
            <h2>Create Noticeboard Post</h2>
            <p style="font-size: 12px; color: var(--danger);">* All fields are mandatory.</p>
            <input type="text" id="oppTitle" placeholder="Company Name & Role" required />
            <textarea id="oppDesc" maxlength="300" placeholder="Description & Eligibility (Max 300 characters)"
                required></textarea>
            <div style="margin-bottom: 5px; font-size: 14px; font-weight: 600;">Deadline</div>
            <input type="date" id="oppDeadline" required />
            <input type="url" id="oppLink" placeholder="Application Link (e.g., https://site.com)" required />
            <div class="card-footer">
                <button class="btn-primary" onclick="submitNewOpportunity()">Upload Post</button>
                <button class="btn-secondary" onclick="closeModal('uploadModal')">Cancel</button>
            </div>
        </div>
    </div>

    <div id="readMoreModal" class="modal-bg">
        <div class="modal">
            <h2 id="rmTitle"></h2>
            <p id="rmBody" style="line-height: 1.6; white-space: pre-wrap;"></p>
            <button class="btn-primary" style="width: 100%; margin-top: 15px;"
                onclick="closeModal('readMoreModal')">Close</button>
        </div>
    </div>

    <div id="editProfileModal" class="modal-bg">
        <div class="modal">
            <h2>Edit Profile</h2>
            <input type="text" id="editName" placeholder="Full Name" />
            <input type="text" id="editAvatarUrl" placeholder="Profile Image URL (e.g. https://...)" />
            <div style="margin-top: 10px; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: var(--muted);">Or upload device photo:</div>
            <input type="file" id="editAvatarFile" accept="image/*" />
            <textarea id="editAbout" placeholder="About Me / Bio"></textarea>
            <textarea id="editEd" placeholder="Education Details"></textarea>
            <div class="card-footer">
                <button class="btn-primary" style="width: 100%" onclick="saveProfile()">Save Changes</button>
                <button class="btn-secondary" style="width: 100%"
                    onclick="closeModal('editProfileModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Shared App Scripts -->
    <script src="../assets/js/app.js"></script>
    <script>
        // Init Dashboard logic
        requireAuth();

        function switchTab(tab) {
            ['notice', 'feed', 'profile'].forEach(t => {
                document.getElementById('tab-' + t).classList.add('hidden');
                document.getElementById('nav-' + t).classList.remove('active');
            });
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('nav-' + tab).classList.add('active');
            
            if (tab === 'notice') renderNoticeboard();
            if (tab === 'feed') renderFeeds();
            if (tab === 'profile') populateProfile();
        }

        function populateProfile() {
            document.getElementById('displayUser').innerText = currentUser.name;
            document.getElementById('editName').value = currentUser.name;
            if (currentUser.avatarUrl) {
                document.getElementById('displayAvatar').src = currentUser.avatarUrl;
                document.getElementById('editAvatarUrl').value = currentUser.avatarUrl;
            }
            if (currentUser.bio) {
                document.getElementById('displayBio').innerText = currentUser.bio;
                document.getElementById('editAbout').value = currentUser.bio;
            }
            if (currentUser.ed) {
                document.getElementById('displayEd').innerText = currentUser.ed;
                document.getElementById('editEd').value = currentUser.ed;
            }

            // Hide admin buttons if student
            if (currentUser.role !== 'admin') {
                const adminBtns = document.querySelectorAll('.admin-only');
                if(adminBtns) adminBtns.forEach(el => el.classList.add('hidden'));
            }
        }

        function saveProfile() {
            const name = document.getElementById('editName').value;
            const url = document.getElementById('editAvatarUrl').value;
            const fileInput = document.getElementById('editAvatarFile');
            const file = fileInput ? fileInput.files[0] : null;
            const about = document.getElementById('editAbout').value;
            const ed = document.getElementById('editEd').value;

            if (name) currentUser.name = name;
            if (about) currentUser.bio = about;
            if (ed) currentUser.ed = ed;
            
            const finishSave = () => {
                saveState();
                populateProfile();
                closeModal('editProfileModal');
                if(fileInput) fileInput.value = "";
                document.getElementById('editAvatarUrl').value = "";
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatarUrl = e.target.result;
                    finishSave();
                };
                reader.readAsDataURL(file);
            } else if (url) {
                currentUser.avatarUrl = url;
                finishSave();
            } else {
                finishSave();
            }
        }

        function renderNoticeboard() {
            const grid = document.getElementById('noticeGrid');
            grid.innerHTML = opportunities.map(opp => `
        <div class="notice-card">
            <div style="display: flex; justify-content: space-between; align-items: start;">
                <h3 style="margin: 0;">${opp.title}</h3>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="deadline-tag">Deadline: ${opp.deadline}</span>
                    <button onclick="deleteNoticePost(${opp.id})" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px;" title="Delete Post">🗑️</button>
                </div>
            </div>
            <p style="color: var(--muted); margin: 15px 0; word-wrap: break-word;">${opp.desc}</p>
            <div class="card-footer">
                <button class="btn-secondary" onclick="openReadMore(${opp.id})">Read More</button>
                <button class="btn-primary" onclick="window.open('${opp.link}', '_blank')">Apply Now</button>
            </div>
        </div>
    `).join('');
        }

        function deleteNoticePost(id) {
            if (confirm("Are you sure you want to delete this notice?")) {
                opportunities = opportunities.filter(o => o.id !== id);
                saveState();
                renderNoticeboard();
            }
        }

        function submitNewOpportunity() {
            const title = document.getElementById('oppTitle').value;
            const desc = document.getElementById('oppDesc').value;
            const deadline = document.getElementById('oppDeadline').value;
            const link = document.getElementById('oppLink').value;

            if (!title || !desc || !deadline || !link) {
                return alert("Error: All fields (Title, Description, Deadline, Link) are mandatory to create a post.");
            }

            opportunities.unshift({ id: Date.now(), title, desc, deadline, link });
            saveState();
            renderNoticeboard();
            closeModal('uploadModal');

            document.getElementById('oppTitle').value = "";
            document.getElementById('oppDesc').value = "";
            document.getElementById('oppDeadline').value = "";
            document.getElementById('oppLink').value = "";
        }

        function openReadMore(id) {
            const opp = opportunities.find(o => o.id === id);
            document.getElementById('rmTitle').innerText = opp.title;
            document.getElementById('rmBody').innerText = opp.desc;
            openModal('readMoreModal');
        }

        function submitFeedPost() {
            const text = document.getElementById('feedInput').value;
            const fileInput = document.getElementById('feedFile');
            const file = fileInput.files[0];

            if (!text && !file) return;

            const addPost = (fileDataUrl, fileName) => {
                feeds.unshift({
                    id: Date.now(),
                    author: currentUser.name,
                    text: text,
                    fileUrl: fileDataUrl,
                    fileName: fileName
                });
                saveState();
                renderFeeds();
                document.getElementById('feedInput').value = "";
                fileInput.value = "";
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    addPost(e.target.result, file.name);
                };
                reader.readAsDataURL(file);
            } else {
                addPost(null, null);
            }
        }

        function deleteFeedPost(id) {
            if (confirm("Are you sure you want to delete this post?")) {
                feeds = feeds.filter(f => f.id !== id);
                saveState();
                renderFeeds();
            }
        }

        function renderFeeds() {
            const list = document.getElementById('feedList');
            list.innerHTML = feeds.map(f => `
        <div class="feed-card">
            <div style="display: flex; justify-content: space-between; align-items: start;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: #cbd5e0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;">
                        ${f.author ? f.author.charAt(0).toUpperCase() : '?'}
                    </div>
                    <strong>${f.author}</strong>
                </div>
                <button onclick="deleteFeedPost(${f.id})" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px;" title="Delete Post">🗑️</button>
            </div>
            ${f.text ? '<p style="margin: 10px 0;">' + f.text + '</p>' : ''}
            ${f.fileUrl && f.fileUrl.startsWith('data:image') ? '<img src="' + f.fileUrl + '" style="width: 100%; border-radius: 8px; margin-top: 10px;" alt="Post image" />' : (f.fileName ? '<div class="attachment-pill">📎 ' + f.fileName + '</div>' : '')}
            <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; display: flex; gap: 20px;">
                <button style="background: none; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 5px; cursor: pointer; border: none; padding: 0;" onclick="this.style.color = 'var(--cobalt)'; this.innerHTML = '👍 Liked'">
                    👍 Like
                </button>
                <button style="background: none; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 5px; cursor: pointer; border: none; padding: 0;">
                    💬 Comment
                </button>
            </div>
        </div>
    `).join('');
        }

        // Initialize first tab
        switchTab('notice');
    </script>
</body>
</html>
