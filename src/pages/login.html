<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlaceIntel | Login</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
    <div id="login-page" class="auth-wrapper">
        <div class="auth-side">
            <h1>PlaceIntel</h1>
            <p>Access the Nexus.</p>
        </div>
        <div class="auth-main">
            <div class="auth-card">
                <h2>Login</h2>
                <input type="email" id="loginEmail" placeholder="Email (@admin.com for Admin)" />
                <input type="password" placeholder="Password" />
                <button class="btn-primary" style="width: 100%;" onclick="handleAuth('login')">Access Dashboard
                    →</button>
                <p style="font-size: 14px; margin-top: 20px;">No account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </div>
    <script src="../assets/js/app.js"></script>
</body>
</html>
