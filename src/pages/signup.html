<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlaceIntel | Signup</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
    <div id="signup-page" class="auth-wrapper">
        <div class="auth-side">
            <h1>Join Nexus</h1>
            <p>Start your journey.</p>
        </div>
        <div class="auth-main">
            <div class="auth-card">
                <h2>Sign Up</h2>
                <input type="text" id="signupName" placeholder="Full Name" />
                <input type="email" id="signupEmail" placeholder="Email Address" />
                <input type="password" placeholder="Password" />
                <button class="btn-primary" style="width: 100%;" onclick="handleAuth('signup')">Create Account</button>
                <p style="font-size: 14px; margin-top: 20px;">Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>
    <script src="../assets/js/app.js"></script>
</body>
</html>
